[pytest]
asyncio_mode = auto
testpaths = tests
python_files = *.py
python_functions = test_*
python_classes = Test*
# Skip integration/e2e (need a live backend + LAN) by default; run with `-m integration`.
addopts = -v --tb=short -m "not integration"
markers =
    integration: requires a running backend and/or a live LAN (deselected by default)
